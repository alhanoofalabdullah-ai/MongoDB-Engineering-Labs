version: "3.9"

services:

  mongo1:
    image: mongo:7
    container_name: mongo-primary
    command: --replSet rs0
    ports:
      - "27017:27017"

  mongo2:
    image: mongo:7
    container_name: mongo-secondary-1
    command: --replSet rs0
    ports:
      - "27018:27017"

  mongo3:
    image: mongo:7
    container_name: mongo-secondary-2
    command: --replSet rs0
    ports:
      - "27019:27017"
